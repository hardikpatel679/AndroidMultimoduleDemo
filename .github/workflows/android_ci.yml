name: Android CI

on:
  push:
    branches: [ "master", "release" ]
  pull_request:
    branches: [ "master", "release" ]

jobs:
  test_and_build:
    # Use macOS for better emulator performance, or ubuntu-latest for cost efficiency
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Static Analysis
    - name: Run Lint
      run: ./gradlew lintDevDebug

    # 2. Run Unit Tests (All Modules)
    - name: Run Unit Tests
      run: ./gradlew testDevDebugUnitTest

    # 3. Run UI Tests (Instrumentation Tests)
    # Using an emulator runner to execute tests in the :feature:login and :app modules
    - name: Run UI Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
        disable-animations: true
        script: ./gradlew connectedDevDebugAndroidTest

    # 4. Build Release APK (Only if tests pass)
    - name: Build Prod Release APK
      run: ./gradlew :app:assembleProdRelease

    # 5. Upload Artifacts
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-prod-release
        path: app/build/outputs/apk/prod/release/*.apk
