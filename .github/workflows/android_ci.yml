name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Job to determine which flavors to run on which OS
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # On main branch: dev on macos, prod on macos
            echo 'matrix=[{"flavor": "dev", "os": "macos-latest"}, {"flavor": "prod", "os": "macos-latest"}]' >> $GITHUB_OUTPUT
          else
            # On other branches: only dev on ubuntu
            echo 'matrix=[{"flavor": "dev", "os": "macos-latest"}]' >> $GITHUB_OUTPUT
          fi

  test_and_build:
    needs: setup
    runs-on: ${{ matrix.cfg.os }}
    strategy:
      fail-fast: false
      matrix:
        cfg: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint (${{ matrix.cfg.flavor }})
      run: ./gradlew lint${{ matrix.cfg.flavor }}Debug

    - name: Run Unit Tests (${{ matrix.cfg.flavor }})
      run: ./gradlew test${{ matrix.cfg.flavor }}DebugUnitTest

    - name: Check Code Coverage (${{ matrix.cfg.flavor }})
      run: ./gradlew jacocoCoverageVerification

    - name: Run UI Tests (${{ matrix.cfg.flavor }})
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: ${{ runner.os == 'macOS' && 'x86_64' || 'x86' }}
        force-avd-creation: true
        emulator-options: >-
          -no-window
          -no-snapshot
          -noaudio
          -no-boot-anim
          -memory 2048
          ${{ runner.os == 'macOS' && '-gpu host' || '-gpu swiftshader_indirect' }}
        disable-animations: true
        script: adb devices && ./gradlew connected${{ matrix.cfg.flavor }}DebugAndroidTest
      env:
        ADB_INSTALL_TIMEOUT: 20

    - name: Build APK (${{ matrix.cfg.flavor }})
      run: ./gradlew :app:assemble${{ matrix.cfg.flavor }}Release

    - name: Upload Artifacts (${{ matrix.cfg.flavor }})
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.cfg.flavor }}-release
        path: app/build/outputs/apk/${{ matrix.cfg.flavor }}/release/*.apk

    - name: Upload Coverage Report (${{ matrix.cfg.flavor }})
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.cfg.flavor }}
        path: build/reports/jacoco/jacocoFullReport/html/
