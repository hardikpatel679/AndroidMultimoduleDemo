name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Lint
      run: ./gradlew lintDevDebug

    - name: Run Unit Tests
      run: ./gradlew testDevDebugUnitTest

    # 3. Code Coverage Check (Threshold 90%)
    - name: Check Code Coverage
      run: ./gradlew jacocoCoverageVerification

    - name: Run UI Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -memory 2048
        disable-animations: true
        script: ./gradlew connectedDevDebugAndroidTest
      env:
        ADB_INSTALL_TIMEOUT: 10

    - name: Build Prod Release APK
      run: ./gradlew :app:assembleProdRelease

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-prod-release
        path: app/build/outputs/apk/prod/release/*.apk

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: build/reports/jacoco/jacocoFullReport/html/
